<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Forex Strategy</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    h1 { color: #123a5c; text-align: center; }
    .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
    .chart-container { position: relative; height: 400px; width: 100%; margin-top: 30px; }
    .legend-box { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .color-box { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Interactive Forex Trend-Confluence Strategy</h1>

    <p>This chart shows an example of a Forex pair with EMA trend, Fibonacci retracement, and candlestick pattern.</p>

    <div class="chart-container">
      <canvas id="forexChart"></canvas>
    </div>

    <div class="legend-box">
      <div class="legend-item"><div class="color-box" style="background:#007bff"></div> EMA 50</div>
      <div class="legend-item"><div class="color-box" style="background:#28a745"></div> EMA 200</div>
      <div class="legend-item"><div class="color-box" style="background:#ffc107"></div> Fibonacci Zone</div>
      <div class="legend-item"><div class="color-box" style="background:#dc3545"></div> Bullish Candle</div>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('forexChart').getContext('2d');

    // Example candlestick chart data
    const forexChart = new Chart(ctx, {
      type: 'candlestick', // Requires chartjs-chart-financial plugin
      data: {
        labels: ['Day 1','Day 2','Day 3','Day 4','Day 5','Day 6','Day 7'],
        datasets: [{
          label: 'EUR/USD Example',
          data: [
            {o:1.100, h:1.120, l:1.095, c:1.115},
            {o:1.115, h:1.118, l:1.110, c:1.112},
            {o:1.112, h:1.125, l:1.110, c:1.122},
            {o:1.122, h:1.130, l:1.120, c:1.128},
            {o:1.128, h:1.135, l:1.125, c:1.132},
            {o:1.132, h:1.140, l:1.130, c:1.138},
            {o:1.138, h:1.145, l:1.135, c:1.142}
          ]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { enabled: true }
        },
        scales: {
          x: { display: true },
          y: { display: true }
        }
      }
    });
  </script>
</body>
</html>
