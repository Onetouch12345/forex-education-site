<script>
const API_KEY = "252a3bd10a2a440e884552e549c73629";

const pairs = [
{symbol:"EUR/USD",action:"BUY"},
{symbol:"GBP/USD",action:"SELL"},
{symbol:"USD/JPY",action:"BUY"},
{symbol:"XAU/USD",action:"SELL"}
];

async function loadSignals(){

for(const pair of pairs){

let symbol = pair.symbol.replace("/","");

try{

const res = await fetch(`https://api.twelvedata.com/price?symbol=${symbol}&apikey=${API_KEY}`);
const data = await res.json();

if(!data.price) continue;

let price = parseFloat(data.price);

let sl,tp;

if(pair.action==="BUY"){
sl = price - price*0.003;
tp = price + price*0.006;
}else{
sl = price + price*0.003;
tp = price - price*0.006;
}

document.getElementById(symbol+"price").innerText = price.toFixed(5);
document.getElementById(symbol+"sl").innerText = sl.toFixed(5);
document.getElementById(symbol+"tp").innerText = tp.toFixed(5);

}catch(e){
console.log("Error loading "+symbol);
}

}

}

setInterval(loadSignals,10000);
loadSignals();
</script>
